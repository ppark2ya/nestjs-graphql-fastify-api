# E2E 테스트용 Docker Swarm 스택
# Apache reverse proxy + Gateway + Log-Streamer + Redis
# 사용: docker stack deploy -c docker-compose.e2e-full.yml e2e

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - app-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  log-streamer:
    image: log-streamer:local
    user: root
    environment:
      - LOG_STREAMER_PORT=4003
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:4003/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  gateway:
    image: gateway:local
    environment:
      - NODE_ENV=production
      - PORT=4000
      - API_KEYS=test-api-key
      - LOG_STREAMER_URL=http://log-streamer:4003
      - LOG_STREAMER_WS_URL=ws://log-streamer:4003/ws/logs
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - app-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
    healthcheck:
      test: ["CMD-SHELL", "wget -q --header='Content-Type: application/json' --header='X-API-Key: test-api-key' --post-data='{\"query\":\"{ health }\"}' -O - http://127.0.0.1:4000/graphql | grep -q health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  apache:
    image: apache-proxy:local
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    networks:
      - app-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  app-network:
    driver: overlay
    attachable: true
