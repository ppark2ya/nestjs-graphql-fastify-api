        BEFORE=$(git rev-parse HEAD~1 2>/dev/null)
        if [ $? -ne 0 ]; then
          echo ">>> Build required (no parent commit, initial commit)"
          exit 0
        fi
        CHANGED=$(git diff --name-only "$BEFORE"..HEAD)
        echo "Changed files ($BEFORE..HEAD):"
        echo "$CHANGED"
        echo "---"
        if echo "$CHANGED" | grep -qE '^apps/log-streamer/'; then
          echo ">>> Log Streamer build required"
        else
          echo ">>> No log-streamer changes, skipping build"
          touch .skip-build
        fi

  - name: build-and-push
    image: docker:cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      DOCKER_REPO:
        from_secret: docker_repo_log_streamer
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
    commands:
      - |
        if [ -f .skip-build ]; then
          echo "Build skipped (no relevant changes)"
          exit 0
        fi
        TAG="${DRONE_BRANCH}-$(echo ${DRONE_COMMIT_SHA} | cut -c1-8)"
        REGISTRY=$(echo "$DOCKER_REPO" | cut -d'/' -f1)
        if echo "$REGISTRY" | grep -qE '[.:]'; then
          echo "$DOCKER_PASSWORD" | docker login "$REGISTRY" -u "$DOCKER_USERNAME" --password-stdin
        else
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        fi
        docker build -f apps/log-streamer/Dockerfile -t "$DOCKER_REPO:$TAG" -t "$DOCKER_REPO:latest" apps/log-streamer/
        docker push "$DOCKER_REPO:$TAG"
        docker push "$DOCKER_REPO:latest"
        echo ">>> Pushed $DOCKER_REPO:$TAG"
    when:
      status:
        - success

---
# ================== Release Detect: Gateway ==================
kind: pipeline
type: docker
name: release-gateway-detect

trigger:
  event:
    - tag
  ref:
    - refs/tags/v*

steps:
  - name: detect-changes
    image: alpine/git
    commands:
      - |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)
        if [ $? -ne 0 ]; then
          echo ">>> Build required (first release, no previous tag)"
          exit 0
        fi
        echo "Previous tag: $PREV_TAG"
        CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD)
        echo "Changed files ($PREV_TAG..HEAD):"
        echo "$CHANGED"
        echo "---"
        if echo "$CHANGED" | grep -qE '^(apps/gateway/|apps/ui/|libs/shared/|package\.json|pnpm-lock\.yaml|tsconfig\.base\.json|nest-cli\.json|nx\.json|\.swcrc)'; then
          echo ">>> Gateway build required"
        else
          echo ">>> No gateway changes, skipping build"
          exit 1
        fi

---
# ================== Release: Gateway ==================
kind: pipeline
type: docker
name: release-gateway

depends_on:
  - release-gateway-detect

trigger:
  event:
    - tag
  ref:
    - refs/tags/v*

steps:
  - name: build-and-push
    image: plugins/docker
    settings:
      dockerfile: apps/gateway/Dockerfile
      context: .
      repo:
        from_secret: docker_repo_gateway
      tags:
        - ${DRONE_TAG}
        - latest
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      build_args_from_env:
        - VITE_API_KEY
    environment:
      VITE_API_KEY:
        from_secret: vite_api_key

