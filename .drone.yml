# ================================================================
# Drone CI Pipeline Configuration
# ================================================================
# git diff HEAD~1 기반 변경 감지로 필요한 서비스만 빌드
# Drone OSS에서 paths trigger를 지원하지 않으므로 git diff로 대체
#
# 변경 감지 전략:
#   - HEAD~1과 HEAD를 비교하여 변경된 파일 목록 추출
#   - merge commit: HEAD~1 = merge 전 브랜치 HEAD → 전체 merge 변경 감지
#   - 일반 commit: HEAD~1 = 직전 커밋
#   - 제한: 여러 non-merge 커밋 한번에 push 시 마지막 커밋만 감지
#
# 필요 Secrets:
#   - docker_username, docker_password
#   - docker_repo_gateway, docker_repo_auth, docker_repo_log_streamer
#
# Runner 설정:
#   Docker socket 마운트 필요
#   DRONE_RUNNER_VOLUMES=/var/run/docker.sock:/var/run/docker.sock
#
# 파이프라인 실행 순서:
#   dev-gateway → dev-auth → dev-log-streamer (depends_on으로 순차 실행, 빌드 서버 부하 방지)
#   release-{service}-detect → release-{service} (detect/build 쌍, 서비스 간 병렬 실행)
#     detect 실패(변경 없음) → build 자동 skip
# ================================================================

# ================== Dev: Gateway ==================
kind: pipeline
type: docker
name: dev-gateway

trigger:
  branch:
    - develop
    - dev-*
  event:
    - push

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock

steps:
  - name: detect-changes
    image: alpine/git
    commands:
      - |
        BEFORE=$(git rev-parse HEAD~1 2>/dev/null)
        if [ $? -ne 0 ]; then
          echo ">>> Build required (no parent commit, initial commit)"
          exit 0
        fi
        CHANGED=$(git diff --name-only "$BEFORE"..HEAD)
        echo "Changed files ($BEFORE..HEAD):"
        echo "$CHANGED"
        echo "---"
        if echo "$CHANGED" | grep -qE '^(apps/gateway/|apps/ui/|libs/shared/|package\.json|pnpm-lock\.yaml|tsconfig\.base\.json|nest-cli\.json|nx\.json|\.swcrc)'; then
          echo ">>> Gateway build required"
        else
          echo ">>> No gateway changes, skipping build"
          touch .skip-build
        fi

  - name: build-and-push
    image: docker:cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      DOCKER_REPO:
        from_secret: docker_repo_gateway
      DOCKER_USERNAME:
        from_secret: docker_username
      DOCKER_PASSWORD:
        from_secret: docker_password
      VITE_API_KEY:
        from_secret: vite_api_key
    commands:
      - |
        if [ -f .skip-build ]; then
          echo "Build skipped (no relevant changes)"
          exit 0
        fi
        TAG="${DRONE_BRANCH}-$(echo ${DRONE_COMMIT_SHA} | cut -c1-8)"
        # Registry 자동 감지: repo 경로에 도메인이 포함되면 해당 registry로 로그인
        REGISTRY=$(echo "$DOCKER_REPO" | cut -d'/' -f1)
        if echo "$REGISTRY" | grep -qE '[.:]'; then
          echo "$DOCKER_PASSWORD" | docker login "$REGISTRY" -u "$DOCKER_USERNAME" --password-stdin
        else
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        fi
        docker build -f apps/gateway/Dockerfile --build-arg VITE_API_KEY="$VITE_API_KEY" -t "$DOCKER_REPO:$TAG" -t "$DOCKER_REPO:latest" .
        docker push "$DOCKER_REPO:$TAG"
        docker push "$DOCKER_REPO:latest"
        echo ">>> Pushed $DOCKER_REPO:$TAG"
    when:
      status:
        - success

